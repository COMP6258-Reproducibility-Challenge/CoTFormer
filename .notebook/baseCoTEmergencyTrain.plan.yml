          # Quarantine check — ensure target ckpt dir is clean (no stale n_head=24 ckpts)
          import os
          import glob
          import torch

          CKPT_DIR = os.path.join(RESULTS_BASE, "owt2", "cotformer_full_depth", EXP_NAME)

          if not os.path.exists(CKPT_DIR):
              print(f"[OK] Target dir does not exist yet — first launch, no quarantine needed.")
              print(f"     Will be created at: {CKPT_DIR}")
          else:
              ckpt_files = sorted(glob.glob(os.path.join(CKPT_DIR, "ckpt_*.pt")))
              if not ckpt_files:
                  print(f"[OK] Target dir exists but contains no ckpt files — clean state.")
              else:
                  print(f"Found {len(ckpt_files)} checkpoint(s) in {CKPT_DIR}. Checking n_head...")
                  bad_ckpts = []
                  for ckpt_path in ckpt_files:
                      try:
                          ckpt = torch.load(ckpt_path, map_location="cpu")
                          model_args = ckpt.get("model_args", None) or {}
                          # Older checkpoints store args in a nested namespace
                          if hasattr(model_args, "__dict__"):
                              n_head_saved = getattr(model_args, "n_head", None)
                          elif isinstance(model_args, dict):
                              n_head_saved = model_args.get("n_head", None)
                          else:
                              n_head_saved = None
                          # Also check top-level 'args' dict (main.py saves stats['args'])
                          if n_head_saved is None:
                              args_dict = ckpt.get("args", {})
                              n_head_saved = args_dict.get("n_head", None)
                          if n_head_saved is not None and int(n_head_saved) != 12:
                              bad_ckpts.append((os.path.basename(ckpt_path), n_head_saved))
                              print(f"  [BAD] {os.path.basename(ckpt_path)}: n_head={n_head_saved}")
                          else:
                              print(f"  [OK]  {os.path.basename(ckpt_path)}: n_head={n_head_saved or 'not stored (assumed OK)'}")
                      except Exception as e:
                          print(f"  [WARN] Could not read {os.path.basename(ckpt_path)}: {e}")

                  if bad_ckpts:
                      raise RuntimeError(
                          f"\n[HARD FAIL] {len(bad_ckpts)} stale checkpoint(s) with n_head!=12 found in:\n"
                          f"  {CKPT_DIR}\n\n"
                          f"Stale files: {[b[0] for b in bad_ckpts]}\n\n"
                          f"These are the broken iridis n_head=24 checkpoints.\n"
                          f"ACTION REQUIRED: rename or remove the directory:\n"
                          f"  mv '{CKPT_DIR}' '{CKPT_DIR}_STALE_n24'\n"
                          f"Then re-run this cell. Training will start fresh."
                      )
                  print(f"\n[OK] All {len(ckpt_files)} existing checkpoint(s) have n_head=12 — safe to resume.")
        tags: [quarantine-check]

